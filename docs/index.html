<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRB vs FEA Interactive Comparison</title>
    <script src="chart.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .container { display: flex; flex-wrap: wrap; }
        .controls { width: 300px; padding: 20px; border: 1px solid #ccc; margin-right: 20px; }
        .charts { flex: 1; min-width: 350px; }
        .chart { width: 100%; height: 640px; max-height: 680px; margin-bottom: 20px; }
        input { width: 100%; margin-bottom: 10px; }
        button { padding: 10px; width: 100%; background: #007bff; color: white; border: none; cursor: pointer; }
        button:hover { background: #0056b3; }
        .results { margin-top: 20px; font-size: 14px; }
    </style>
</head>
<body>
    <h1>Interactive PRB vs FEA Comparison</h1>
    <div class="container">
        <div class="controls">
            <h2>PRB Parameters</h2>
        <label>Crank length r_1: <input type="number" id="r1" value="3.00" step="0.01"></label>
        <label>Coupler length L_c: <input type="number" id="Lc" value="5.00" step="0.01"></label>
        <label>Offset: <input type="number" id="offset" value="0.50" step="0.01"></label>
        <label>Characteristic radius factor gamma: <input type="number" id="gamma" value="0.8517" step="0.0001"></label>
        <label>Flexural rigidity E I: <input type="number" id="EI" value="16.00" step="0.01"></label>
        <button id="updateButton">Update Plots</button>
        <div class="results" id="results"></div>
    </div>
    <div class="charts">
        <canvas id="mechCanvas" width="400" height="300" style="border:1px solid #ccc;"></canvas>
        <h3>Current comparison: My PRB vs Howell-Midha</h3>
        <canvas id="currentDispChart" class="chart"></canvas>
        <h3>Comparison: FEA, Howell-Midha, My PRB</h3>
        <canvas id="baselineDispChart" class="chart"></canvas>
    </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
